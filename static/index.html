<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NashGuide AI — Your Personal Nashville Trip Planner</title>
<meta name="description" content="AI-powered personalized Nashville trip planning. Get an hour-by-hour itinerary with insider tips in under 2 minutes."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body,#root{background:#0a0a0f!important;color:#fff!important;min-height:100vh}
body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.playfair{font-family:'Playfair Display',serif}
a{color:inherit;text-decoration:none}

/* Animations */
@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-600px) rotate(20deg);opacity:0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(255,182,30,.3),0 0 60px rgba(255,182,30,.1)}50%{box-shadow:0 0 30px rgba(255,182,30,.5),0 0 80px rgba(255,182,30,.2)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.shimmer-text{background:linear-gradient(90deg,#FFB61E 0%,#fff 15%,#FFB61E 30%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.slide-up{animation:slideUp .8s ease-out forwards}
.slide-up-1{animation:slideUp .8s ease-out .1s forwards;opacity:0}
.slide-up-2{animation:slideUp .8s ease-out .2s forwards;opacity:0}
.slide-up-3{animation:slideUp .8s ease-out .3s forwards;opacity:0}
.slide-up-4{animation:slideUp .8s ease-out .4s forwards;opacity:0}
.glow-btn{animation:pulseGlow 3s ease-in-out infinite}
.fade-in{animation:fadeIn .5s ease-out}

.grain::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1}

.note{position:absolute;pointer-events:none;user-select:none;color:rgba(255,182,30,.15);animation:floatUp 8s ease-in-out infinite;bottom:-20px}

/* Utilities */
.container{max-width:1100px;margin:0 auto;padding:0 20px}
.text-center{text-align:center}
.amber{color:#FFB61E}
.gray4{color:#9ca3af}
.gray5{color:#6b7280}
.gray6{color:#4b5563}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.grid{display:grid}.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-pricing{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px}
.tier-raffle{position:absolute;top:-12px;right:14px;padding:5px 12px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#0a0a0f;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border-radius:999px;box-shadow:0 4px 14px rgba(245,158,11,.4);white-space:nowrap;z-index:2}
.tier-card.free{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.tier-card.free .free-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 14px;background:#22c55e;color:#000;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:999px}
.relative{position:relative}
.hidden{display:none}

.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:16px 40px;background:linear-gradient(to right,#f59e0b,#f97316);color:#000;font-weight:700;font-size:18px;border:none;border-radius:999px;cursor:pointer;transition:all .2s}
.btn-primary:hover{transform:scale(1.05)}
.btn-primary:active{transform:scale(.95)}

.card{padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);transition:all .3s}
.card:hover{border-color:rgba(245,158,11,.1);background:rgba(255,255,255,.04)}

.tag{display:inline-block;padding:6px 16px;border-radius:999px;border:1px solid rgba(245,158,11,.3);color:#fbbf24;font-size:12px;letter-spacing:2px;text-transform:uppercase;background:rgba(245,158,11,.05)}

.check-icon{width:16px;height:16px;color:#f59e0b;flex-shrink:0;margin-top:2px}

/* Quiz */
.quiz-option{width:100%;text-align:left;padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);color:#d1d5db;cursor:pointer;font-size:16px;font-family:inherit;transition:all .2s}
.quiz-option:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);transform:scale(1.01)}
.quiz-option.selected{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#fff}

.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.05)}
.progress-fill{height:100%;background:linear-gradient(to right,#f59e0b,#f97316);transition:width .5s}

.input{width:100%;padding:12px 20px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;font-family:inherit;outline:none}
.input:focus{border-color:rgba(245,158,11,.5)}
.input::placeholder{color:#4b5563}

/* Pricing */
.tier-card{position:relative;padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);cursor:pointer;transition:all .2s}
.tier-card:hover{transform:scale(1.02)}
.tier-card.popular{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.05)}
.tier-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 16px;background:linear-gradient(to right,#f59e0b,#f97316);color:#000;font-size:12px;font-weight:700;border-radius:999px;white-space:nowrap}
.tier-btn{width:100%;padding:12px;border-radius:999px;font-weight:700;font-size:14px;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
.tier-btn-primary{background:linear-gradient(to right,#f59e0b,#f97316);color:#000}
.tier-btn-secondary{background:rgba(255,255,255,.05);color:#fff}
.tier-btn-secondary:hover{background:rgba(255,255,255,.1)}

/* Stars */
.star{fill:#FFB61E;width:16px;height:16px}

/* Responsive */
@media(max-width:768px){
  .grid-3{grid-template-columns:1fr}
  h1{font-size:48px!important}
  .hero-subtitle{font-size:16px!important}
  .neighborhoods{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

/* ============ QUIZ ============ */
function Quiz({ step, answers, onAnswer, onBack }) {
  const [textInput, setTextInput] = useState("");
  const current = QUIZ_STEPS[step];
  const progress = ((step+1)/QUIZ_STEPS.length)*100;
  return (
    <div className="fade-in" style={{minHeight:'100vh',background:'#0a0a0f',display:'flex',flexDirection:'column'}}>
      <div className="progress-bar"><div className="progress-fill" style={{width:progress+'%'}}/></div>
      <div style={{padding:16}}>
        <button onClick={onBack} className="flex items-center gap-2 gray5" style={{background:'none',border:'none',cursor:'pointer',fontSize:14,fontFamily:'inherit',color:'#6b7280'}}>
          <svg style={{width:16,height:16}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg> Back
        </button>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 20px 80px'}}>
        <div style={{width:'100%',maxWidth:520}} key={step}>
          <div style={{color:'rgba(245,158,11,.4)',fontSize:14,fontFamily:'monospace',marginBottom:12}}>{step+1} / {QUIZ_STEPS.length}</div>
          <h2 className="playfair" style={{fontSize:36,fontWeight:700,marginBottom:40}}>{current.question}</h2>
          {current.type === 'select' ? (
            <div className="flex flex-col gap-3">
              {current.options.map(opt => (
                <button key={opt} className={`quiz-option ${answers[current.id]===opt?'selected':''}`} onClick={()=>onAnswer(current.id,opt)}>{opt}</button>
              ))}
            </div>
          ) : (
            <div>
              <textarea className="input" value={textInput} onChange={e=>setTextInput(e.target.value)} placeholder={current.placeholder} rows={3} style={{resize:'none',marginBottom:16}}/>
              <button className="btn-primary" style={{fontSize:14,padding:'12px 32px'}} onClick={()=>onAnswer(current.id,textInput||"No special requests")}>{textInput?'Next':'Skip'}</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============ CHECKOUT ============ */
function Checkout({ tier, quizAnswers, onBack }) {
  const [email, setEmail] = useState("");
  const [processing, setProcessing] = useState(false);
  const [promoCode, setPromoCode] = useState("");
  const [promoMsg, setPromoMsg] = useState(null);  // {type: 'ok'|'err', text: ...}
  const [applyingPromo, setApplyingPromo] = useState(false);

  const quizPayload = () => ({
    email: email,
    visit_dates: quizAnswers.dates || 'This weekend',
    num_days: parseInt(quizAnswers.days) || 3,
    group_type: quizAnswers.group || 'Friends trip',
    vibe: quizAnswers.vibe || 'Mix of everything',
    budget: quizAnswers.budget || 'Mid-range',
    must_dos: quizAnswers.mustdos || '',
    product_type: tier.id,
  });

  const handleApplyPromo = async () => {
    if (!email) { setPromoMsg({type:'err', text:'Enter your email first'}); return; }
    if (!promoCode) { setPromoMsg({type:'err', text:'Enter a promo code'}); return; }
    setApplyingPromo(true);
    setPromoMsg(null);
    try {
      const res = await fetch(API_BASE + '/api/promo/apply', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code: promoCode, ...quizPayload() })
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || 'Code invalid');
      }
      if (data.success && data.free) {
        if(window.ngTrack)window.ngTrack.paymentStart(tier.id, 0);
        // Skip PayPal entirely — go straight to success.
        window.location.href = '/?payment=success';
        return;
      }
      throw new Error('Unexpected response');
    } catch(e) {
      setPromoMsg({type:'err', text: e.message || String(e)});
      setApplyingPromo(false);
    }
  };

  const handleFree = async () => {
    if (!email) return;
    if(window.ngTrack)window.ngTrack.paymentStart(tier.id, 0);
    setProcessing(true);
    try {
      const res = await fetch(API_BASE + '/api/free/redeem', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: email,
          visit_dates: quizAnswers.dates || 'This weekend',
          num_days: 1,
          group_type: quizAnswers.group || 'Friends trip',
          vibe: quizAnswers.vibe || 'Mix of everything',
          budget: quizAnswers.budget || 'Budget-friendly',
          must_dos: quizAnswers.mustdos || '',
        })
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error('Free redemption failed (' + res.status + '): ' + errText.slice(0, 300));
      }
      window.location.href = '/?payment=success';
    } catch(e) {
      alert('Free signup failed: ' + (e.message || e));
      setProcessing(false);
    }
  };

  const handlePay = async () => {
    if (tier.id === 'free') return handleFree();
    if (!email) return;
    if(window.ngTrack)window.ngTrack.paymentStart(tier.id, tier.price);
    setProcessing(true);
    try {
      // 1. Submit quiz + create/find customer. This is where the email first
      //    gets attached to the quiz answers — we don't submit until now.
      const quizRes = await fetch(API_BASE + '/api/quiz/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: email,
          visit_dates: quizAnswers.dates || 'This weekend',
          num_days: parseInt(quizAnswers.days) || 3,
          group_type: quizAnswers.group || 'Friends trip',
          vibe: quizAnswers.vibe || 'Mix of everything',
          budget: quizAnswers.budget || 'Mid-range',
          must_dos: quizAnswers.mustdos || '',
          product_type: tier.id
        })
      });
      if (!quizRes.ok) {
        const errText = await quizRes.text();
        throw new Error('Quiz submission failed (' + quizRes.status + '): ' + errText.slice(0, 300));
      }
      const quizData = await quizRes.json();
      if (!quizData.customer_id || !quizData.quiz_response_id) {
        throw new Error('Quiz response missing IDs: ' + JSON.stringify(quizData).slice(0, 300));
      }

      // 2. Create PayPal order
      const payRes = await fetch(API_BASE + '/api/payment/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          customer_id: quizData.customer_id,
          quiz_response_id: quizData.quiz_response_id,
          product_type: tier.id
        })
      });
      if (!payRes.ok) {
        const errText = await payRes.text();
        throw new Error('Payment creation failed (' + payRes.status + '): ' + errText.slice(0, 300));
      }
      const payData = await payRes.json();

      // 3. Redirect to PayPal — it will come back to /api/payment/success
      if (payData.approval_url) {
        window.location.href = payData.approval_url;
        return;
      }
      throw new Error(payData.detail || 'No approval URL returned');
    } catch(e) {
      alert('Payment setup failed: ' + (e.message || e));
      setProcessing(false);
    }
  };

  return (
    <div style={{minHeight:'100vh',background:'#0a0a0f',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:440}}>
        <button onClick={onBack} className="flex items-center gap-2" style={{background:'none',border:'none',cursor:'pointer',fontSize:14,fontFamily:'inherit',color:'#6b7280',marginBottom:32}}>
          <svg style={{width:16,height:16}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg> Back to plans
        </button>
        <div className="card" style={{marginBottom:24}}>
          <h3 style={{fontWeight:700,fontSize:18,marginBottom:4}}>{tier.name}</h3>
          <p className="gray5" style={{fontSize:14,marginBottom:16}}>{tier.tagline}</p>
          <div style={{fontSize:48,fontWeight:700,marginBottom:24}}>
            {tier.price === 0 ? <span style={{color:'#4ade80'}}>Free</span> : <>${tier.price} <span className="gray5" style={{fontSize:16,fontWeight:400}}>USD</span></>}
          </div>
          {tier.raffle && (
            <div style={{padding:'10px 14px',background:'linear-gradient(135deg,rgba(245,158,11,.12),rgba(249,115,22,.08))',border:'1px solid rgba(245,158,11,.35)',borderRadius:10,marginBottom:16,fontSize:13,color:'#fbbf24'}}>
              🎰 <b>Auto-entered in our $10,000 cash giveaway</b> once your payment clears.
            </div>
          )}
          <div style={{marginBottom:16}}>
            <label className="gray4" style={{fontSize:14,display:'block',marginBottom:6}}>Email (we'll send your itinerary here)</label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com"/>
          </div>

          {tier.id !== 'free' && (
            <div style={{marginBottom:16,padding:12,background:'rgba(245,158,11,.05)',border:'1px dashed rgba(245,158,11,.3)',borderRadius:10}}>
              <label className="gray4" style={{fontSize:12,display:'block',marginBottom:6,letterSpacing:1,textTransform:'uppercase',fontWeight:600,color:'#fbbf24'}}>Promo / test code</label>
              <div style={{display:'flex',gap:6}}>
                <input className="input" type="text" value={promoCode} onChange={e=>{setPromoCode(e.target.value.toUpperCase());setPromoMsg(null);}} placeholder="CODE" style={{flex:1,textTransform:'uppercase',letterSpacing:1,fontFamily:'monospace'}}/>
                <button onClick={handleApplyPromo} disabled={applyingPromo||!promoCode||!email} style={{padding:'0 16px',background:(applyingPromo||!promoCode||!email)?'rgba(255,255,255,.08)':'rgba(245,158,11,.2)',color:(applyingPromo||!promoCode||!email)?'#666':'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,fontSize:13,fontWeight:700,cursor:(applyingPromo||!promoCode||!email)?'not-allowed':'pointer',fontFamily:'inherit'}}>{applyingPromo?'…':'Apply'}</button>
              </div>
              {promoMsg && (
                <div style={{marginTop:8,fontSize:12,color:promoMsg.type==='err'?'#ff6b7a':'#4ade80'}}>{promoMsg.text}</div>
              )}
            </div>
          )}

          <button onClick={handlePay} disabled={!email||processing} style={{width:'100%',padding:16,background:(!email||processing)?'rgba(255,255,255,.1)':(tier.id==='free'?'linear-gradient(to right,#22c55e,#16a34a)':'linear-gradient(to right,#f59e0b,#f97316)'),color:(!email||processing)?'#666':'#000',fontWeight:700,border:'none',borderRadius:12,fontSize:14,cursor:(!email||processing)?'not-allowed':'pointer',fontFamily:'inherit'}}>
            {processing ? 'Processing...' : (tier.id==='free' ? 'Send me my free 1-day guide →' : `Pay $${tier.price} with PayPal`)}
          </button>
        </div>
        <div className="flex items-center justify-center gap-4 gray6" style={{fontSize:12,flexWrap:'wrap'}}>
          <span className="flex items-center gap-1">
            <svg style={{width:12,height:12}} fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd"/></svg>
            Secure checkout
          </span>
          <span>&middot;</span><span>Instant delivery</span><span>&middot;</span><span>Money-back guarantee</span>
        </div>
      </div>
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [view, setView] = useState("landing");
  const [quizStep, setQuizStep] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [selectedTier, setSelectedTier] = useState(null);
  const [waitlistDone, setWaitlistDone] = useState(false);

  // Detect payment return from PayPal and show success / error state.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const payment = params.get('payment');
    const reason = params.get('reason');
    if (payment === 'success') {
      setView('success');
      window.history.replaceState({}, '', '/');
    } else if (payment === 'cancelled') {
      alert('Payment was cancelled. You can try again anytime.');
      window.history.replaceState({}, '', '/');
    } else if (payment === 'error') {
      alert('There was an issue with your payment' + (reason ? ' (' + reason + ')' : '') + '. Please try again or contact support.');
      window.history.replaceState({}, '', '/');
    }
  }, []);

  const handleQuizAnswer = (stepId, answer) => {
    if(window.ngTrack)window.ngTrack.quizStep(quizStep, answer);
    const updated = {...quizAnswers, [stepId]: answer};
    setQuizAnswers(updated);
    if (quizStep < QUIZ_STEPS.length - 1) {
      setTimeout(() => setQuizStep(quizStep + 1), 300);
    } else {
      // Don't submit yet — we need the email, which is collected at checkout.
      // The quiz → customer → order → PayPal chain fires from Checkout.handlePay.
      if(window.ngTrack)window.ngTrack.quizComplete(updated);
      if(window.ngTrack)window.ngTrack.tierView();
      setView("pricing");
    }
  };

  const handleWaitlist = (email) => {
    if(window.ngTrack)window.ngTrack.waitlistSignup(email);
    fetch(API_BASE + '/api/waitlist', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    }).catch(() => {});
    setWaitlistDone(true);
  };

  const startQuiz = () => {
    if(window.ngTrack)window.ngTrack.quizStart();
    setView("quiz");
  };

  const selectTier = (t) => {
    if(window.ngTrack)window.ngTrack.tierSelect(t.id, t.price);
    if(window.ngTrack)window.ngTrack.checkoutStart(t.id, t.price);
    setSelectedTier(t);
    setView("checkout");
  };

  const backToPricing = () => {
    if(window.ngTrack)window.ngTrack.tierView();
    setView("pricing");
  };

  if (view === "quiz") return <Quiz step={quizStep} answers={quizAnswers} onAnswer={handleQuizAnswer} onBack={()=> quizStep > 0 ? setQuizStep(quizStep-1) : setView("landing")} />;
  if (view === "pricing") return <Pricing answers={quizAnswers} onSelect={selectTier} onBack={()=>{setView("quiz");setQuizStep(QUIZ_STEPS.length-1)}} />;
  if (view === "checkout") return <Checkout tier={selectedTier} quizAnswers={quizAnswers} onBack={backToPricing} />;
  if (view === "success") return (
    <div style={{minHeight:'100vh',background:'#0a0a0f',display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',padding:20}}>
      <div style={{maxWidth:560}}>
        <div style={{fontSize:64,marginBottom:24}}>{"\u{1F3B8}"}</div>
        <h1 className="playfair" style={{fontSize:48,fontWeight:700,marginBottom:16,color:'#fff',lineHeight:1.1}}>You're all set!</h1>
        <p className="gray4" style={{fontSize:18,maxWidth:500,margin:'0 auto 32px',lineHeight:1.6}}>Your personalized Nashville itinerary is being crafted right now. Check your email in the next few minutes — we're sending you something special.</p>
        <button onClick={()=>{window.location.href='/'}} style={{padding:'14px 36px',background:'linear-gradient(to right,#f59e0b,#f97316)',color:'#000',fontWeight:700,border:'none',borderRadius:999,fontSize:16,cursor:'pointer',fontFamily:'inherit'}}>Back to Home</button>
      </div>
    </div>
  );
  return <Landing onStart={startQuiz} onWaitlist={handleWaitlist} waitlistDone={waitlistDone} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
