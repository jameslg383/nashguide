services:
  nashguide-postgres:
    image: postgres:16-alpine
    container_name: nashguide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nashguide
      POSTGRES_PASSWORD: nashguide
      POSTGRES_DB: nashguide
    volumes:
      - nashguide_pgdata:/var/lib/postgresql/data
    networks:
      - nashguide-net

  nashguide-redis:
    image: redis:7-alpine
    container_name: nashguide-redis
    restart: unless-stopped
    networks:
      - nashguide-net

  nashguide-api:
    build: .
    container_name: nashguide-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nashguide:nashguide@nashguide-postgres:5432/nashguide
      REDIS_URL: redis://nashguide-redis:6379/1
    # Port 8080 is reached via Caddy on the internal network only.
    # Do NOT publish it to the host — the API has no auth at the transport layer.
    expose:
      - "8080"
    depends_on:
      - nashguide-postgres
      - nashguide-redis
    volumes:
      - ./static:/app/static
      - ./data:/app/data
    networks:
      nashguide-net:
        aliases:
          - api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080

  caddy:
    image: caddy:2-alpine
    container_name: nashguide-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nashguide-api
    networks:
      - nashguide-net

  nashguide-workers:
    build: .
    container_name: nashguide-workers
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nashguide:nashguide@nashguide-postgres:5432/nashguide
      REDIS_URL: redis://nashguide-redis:6379/1
    depends_on:
      - nashguide-postgres
      - nashguide-redis
      - nashguide-api
    volumes:
      - ./static:/app/static
      - ./data:/app/data
    networks:
      - nashguide-net
    command: python -m agents.run_all

networks:
  nashguide-net:
    driver: bridge

volumes:
  nashguide_pgdata:
  caddy_data:    # Let's Encrypt cert storage — persist across restarts
  caddy_config:
